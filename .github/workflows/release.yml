name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ej. v2026.05.25)'
        required: true
        default: 'v2026.05.25'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow pyserial svgpathtools ezdxf pymupdf

      - name: Build exe
        run: |
          python crear_icono.py
          python -m PyInstaller PlotterAntike.spec --noconfirm --clean

      - name: Package installer zip
        shell: pwsh
        run: |
          Copy-Item instalar.bat dist\instalar.bat -Force
          Copy-Item instalar.ps1 dist\instalar.ps1 -Force
          Copy-Item desinstalar.bat dist\desinstalar.bat -Force
          Copy-Item desinstalar.ps1 dist\desinstalar.ps1 -Force
          Compress-Archive -Force `
            -Path dist\PlotterAntike.exe, dist\instalar.bat, dist\instalar.ps1, dist\desinstalar.bat, dist\desinstalar.ps1 `
            -DestinationPath PlotterAntike-Windows.zip

      - name: Determine version tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "tag=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Create or update release and upload Windows zip
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $TAG="${{ steps.tag.outputs.tag }}"
          $REPO="${{ github.repository }}"
          $EXISTS = gh release view $TAG --repo $REPO 2>$null
          if (-not $?) {
            gh release create $TAG `
              --repo $REPO `
              --title "Plotter Antike $TAG" `
              --notes "## Instalacion`n`n### Windows`n1. Descarga **PlotterAntike-Windows.zip**`n2. Extrae la carpeta`n3. Doble clic en **instalar.bat**`n4. Se crea un acceso directo en el Escritorio`n`n### Mac`n1. Descarga **PlotterAntike-Mac.zip**`n2. Extrae y abre **PlotterAntike**`n3. Si Mac bloquea la app: clic derecho -> **Abrir**" `
              --latest
          }
          gh release upload $TAG PlotterAntike-Windows.zip --repo $REPO --clobber

  build-mac:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pyserial svgpathtools ezdxf pymupdf

      - name: Build app
        run: |
          pyinstaller --onefile --windowed --name PlotterAntike \
            --hidden-import serial \
            --hidden-import serial.tools \
            --hidden-import serial.tools.list_ports \
            --hidden-import svgpathtools \
            --hidden-import ezdxf \
            --hidden-import fitz \
            plotter_control.py --noconfirm --clean

      - name: Package zip
        run: |
          cd dist
          zip ../PlotterAntike-Mac.zip PlotterAntike

      - name: Determine version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Mac zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release upload "$TAG" PlotterAntike-Mac.zip \
            --repo ${{ github.repository }} --clobber
